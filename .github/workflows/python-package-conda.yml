name: Build Windows

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download and extract mpv
        shell: pwsh
        run: |
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260531/mpv-dev-x86_64-20260531-git-13a3e3a.7z"

          Invoke-WebRequest -Uri $url -OutFile mpv.7z

          choco install 7zip -y

          7z x mpv.7z -ompv

          $dll = Get-ChildItem mpv -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1

          if (-not $dll) {
            throw "libmpv-2.dll not found"
          }

          Copy-Item $dll.FullName libmpv-2.dll

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $args = @(
            "--onefile"
            "--windowed"
            "--name", "AnimePlayer"
          )

          if (Test-Path icon.ico) {
            $args += "--icon=icon.ico"
          }

          $args += @(
            "--add-data", "icon.png;.",
            "--add-binary", "libmpv-2.dll;.",
            "--hidden-import", "oauth_server",
            "--hidden-import", "oauth_manager",
            "--hidden-import", "aiomisc",
            "--hidden-import", "aiomisc.aiohttp",
            "--collect-all", "PySide6",
            "main.py"
          )

          pyinstaller @args

      - name: Copy mpv-2.dll to dist (in case it wasn't bundled)
        shell: pwsh
        run: |
          if (Test-Path dist\AnimePlayer.exe) {
            Copy-Item libmpv-2.dll dist\ -ErrorAction SilentlyContinue
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimePlayer-Windows
          path: |
            dist/AnimePlayer.exe
            dist/mpv-2.dll
          if-no-files-found: warn

      - name: Create Release (on tag)
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          files: |
            dist/AnimePlayer.exe
            dist/mpv-2.dll
          generate_release_notes: true
