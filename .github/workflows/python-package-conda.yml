name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Download mpv
        run: |
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260531/mpv-dev-x86_64-20260531-git-13a3e3a.7z"
      
          Invoke-WebRequest -Uri $url -OutFile mpv.zip
      
          Expand-Archive mpv.zip -DestinationPath mpv
      
          $dll = Get-ChildItem mpv -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1
          if (-not $dll) {
            throw "libmpv-2.dll not found"
          }
      
          Copy-Item $dll.FullName libmpv-2.dll
        shell: pwsh

      - name: Convert icon to .ico (if needed)
        run: |
          if (Test-Path icon.png) {
            if (-not (Test-Path icon.ico)) {
              python -c "
          from PIL import Image
          img = Image.open('icon.png')
          img.save('icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          " 2>$null || echo "Pillow not available, skipping icon conversion"
            }
          }
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          $iconArg = ""
          if (Test-Path icon.ico) { $iconArg = "--icon=icon.ico" }

          pyinstaller `
            --onefile `
            --windowed `
            --name AnimePlayer `
            $iconArg `
            --add-data "icon.png;." `
            --add-binary "mpv-2.dll;." `
            --hidden-import oauth_server `
            --hidden-import oauth_manager `
            --hidden-import aiomisc `
            --hidden-import aiomisc.aiohttp `
            --collect-all PySide6 `
            main.py
        shell: pwsh

      - name: Copy mpv-2.dll to dist (in case it wasn't bundled)
        run: |
          if (Test-Path dist\AnimePlayer.exe) {
            Copy-Item mpv-2.dll dist\ -ErrorAction SilentlyContinue
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimePlayer-Windows
          path: |
            dist/AnimePlayer.exe
            dist/mpv-2.dll
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AnimePlayer.exe
            dist/mpv-2.dll
          generate_release_notes: true
